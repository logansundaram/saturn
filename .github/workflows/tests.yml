# Offline unit suite — the WHOLE tests/ directory under pytest (gate policy, the three multiset
# plan walkers, observation clamping, config persistence, sessions/rewind, RAG loaders, the
# calculator evaluator, …), not just tests/test_core.py. No Ollama, no network, no embedder:
# everything under test is offline by design (see tests/conftest.py), so this runs anywhere.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Keep in sync with requires-python + classifiers in pyproject.toml.
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        # Install from the package, not requirements.txt — a dependency missing from
        # pyproject.toml fails HERE instead of shipping broken to pipx/uv installs.
        run: pip install -e .[dev]
      - name: Run unit suite
        run: python -m pytest tests/ -q

  package:
    # Build the wheel and install it into a CLEAN venv (no checkout on sys.path), then run the
    # entry point — catches packaging breakage (a module missing from py-modules/packages, a
    # data-file not shipped, a dep missing from pyproject) that the unit job never sees.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: pipx run build --wheel
      - name: Install wheel into a clean venv
        run: |
          python -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install dist/*.whl
      - name: Smoke-test the installed package
        env:
          SATURDAY_HOME: ${{ runner.temp }}/saturday-home
        run: |
          cd "$RUNNER_TEMP"
          ./venv/bin/saturn --version
          ./venv/bin/saturn --help > /dev/null
          ./venv/bin/python -c "from trust import digest; assert digest.canonical_digest({'x': 1})"
