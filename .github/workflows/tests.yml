# Offline unit suite — the WHOLE tests/ directory under pytest (gate policy, the three multiset
# plan walkers, observation clamping, config persistence, sessions/rewind, RAG loaders, the
# calculator evaluator, …), not just tests/test_core.py. No Ollama, no network, no embedder:
# everything under test is offline by design (see tests/conftest.py), so this runs anywhere.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Keep in sync with requires-python + classifiers in pyproject.toml.
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run unit suite
        run: python -m pytest tests/ -q
