# Saturday.ai runtime configuration (Phase 3).
#
# This file externalizes everything that used to be hard-coded across llms.py, rag.py,
# document_registry.py, and agent.py: the model bindings, the filesystem paths, and the
# loop/safety knobs. The agent references model ROLES, never concrete model ids — so
# swapping hardware is a one-line `active_tier` change here and never touches graph logic.

# Which hardware-tier preset (under `tiers:` below) is live. Change this one line to
# re-point every role at a different model set.
active_tier: workstation

# ---------------------------------------------------------------------------
# Filesystem paths (relative to the repo root). Single source of truth.
# ---------------------------------------------------------------------------
paths:
  database: database
  documents: database/documents
  workspace: database/workspace
  cache: database/cache                # persisted RAG vector store + corpus/summary caches
  memory: database/memory/memory.md   # persistent durable-facts store (remember/recall)
  db_sqlite: database/db.sqlite        # SqliteSaver checkpoints + trace
  sessions: database/sessions          # saved conversations (/save and /load)
  snapshots: database/snapshots        # per-turn pre-write file snapshots (/undo)
  permissions: database/permissions.json  # persisted /policy risk overrides + allow prefixes
  exports: logging/exports             # /trace export run records (audit artifacts)

# ---------------------------------------------------------------------------
# Loop / safety runtime knobs (were the MAX_ITERATIONS constant + the gate policy).
# ---------------------------------------------------------------------------
runtime:
  # Execute-pass cap for the plan/execute engine (2026-07-03): one pass ≈ one plan step, so this
  # bounds the longest plan (incl. replan-expanded fan-outs) a single turn may run. Every early
  # landing is disclosed by synthesize's incidents block.
  max_iterations: 16
  # Tools AT OR BELOW this risk tier run without prompting; anything riskier hits the
  # approval gate. One of: read_only | side_effecting | destructive.
  auto_approve: read_only
  # Ollama context window (`num_ctx`) for every local model. `null` = auto: each model uses its
  # `capabilities.<model>.context_window` below. An integer overrides all roles at once (the
  # /config context command sets this live). Without it Ollama silently caps the window at 2048.
  num_ctx: null
  # Read timeout (seconds) for a single local-model call. Guards against a WEDGED Ollama daemon
  # (accepts the connection but never responds) hanging a turn forever — a turn that times out now
  # fails cleanly and returns to the prompt. Set generously: it must exceed your slowest single
  # generation so a healthy-but-slow model is never false-tripped (connect is capped separately at
  # ~10s, so a daemon that is simply DOWN still fails fast). null disables the timeout.
  llm_timeout: 120
  # Auto-compaction: when a turn leaves the context window filled past `compact_threshold` (a
  # fraction, 0–1), the older turns are folded into one LLM-written summary before the next turn so
  # the conversation stops re-sending — and overflowing — the window. The mechanical per-turn
  # compaction always runs; this is the heavier LLM summary. `/compact` triggers it on demand.
  auto_compact: true
  compact_threshold: 0.85
  # Answer provenance: number the gathered tool results/retrieved documents handed to the
  # synthesizer, ask it to cite the matching [n] inline, and append a mechanical "Sources" footer
  # mapping each number to the tool call/document behind it. false restores unadorned answers.
  citations: true
  # Air-gap: when true, every network egress is blocked and recorded — web tools refuse, remote MCP
  # calls refuse, and a cloud-bound role refuses to run (the turn fails with an actionable message).
  # Privacy made enforceable + verifiable, not just asserted. Toggle live with `/privacy airgap
  # on|off`; `/privacy airgap` (bare) proves the current posture. Every blocked attempt shows in
  # `/privacy egress`.
  airgap: false
  # Outbound redaction for cloud-bound roles (cloud-hybrid tier): strip secrets (API keys, tokens,
  # private keys, JWTs, emails) from prompts+context before they reach a cloud model. One of:
  #   off    no scan (default — a fully-local tier never leaves the machine anyway)
  #   warn   detect + count (recorded to /privacy egress), but send unmodified
  #   redact replace each secret with [REDACTED:<kind>] before sending
  # Configure + preview with `/privacy redact`. Local (Ollama) calls are never scanned — there's
  # no boundary.
  redaction: off
  # Prompt-injection quarantine (quarantine.py): UNTRUSTED tool output (web, http_request, remote
  # MCP, the ingested corpus) is scanned for instruction-shaped content ("ignore your previous
  # instructions", tool-coercion, role overrides). A hit is flagged in the trace rail, fenced
  # between data-not-instructions markers before the model sees it, and shown at the approval
  # gate. One of:
  #   off    no scanning
  #   warn   scan + fence + show flags, but never change gating
  #   gate   warn, plus: the FIRST tool batch after a flagged observation faces the approval gate
  #          regardless of risk tier (one fresh human look at calls whose arguments may derive
  #          from injected content). The safe default.
  quarantine: gate
  # Trust receipt (receipt.py): append the trust segment to the one-line stats receipt under each
  # answer — `local-only` (or the turn's egress bytes/host summary), blocked attempts, and how
  # many calls faced the approval gate. Every answer proves the posture; false restores the plain
  # stats receipt.
  receipt: true
  # Token-confidence grading (core/confidence.py): while the final answer streams, the daemon's
  # per-token logprobs are captured and runs of consecutive low-probability tokens render RED —
  # live in the streaming tail, in the freeze editor (Esc), and on a corrected answer's final
  # render; the receipt counts the uncertain spans. The model's own uncertainty, made visible
  # where it lands. false stops requesting logprobs entirely (nothing is captured or marked).
  confidence: true
  # A token counts LOW below this sampled probability (0-1). RAISE to mark more aggressively,
  # LOWER to mark only the model's wildest guesses (the stricter, quieter default). A run needs
  # 3+ consecutive low tokens — single uncertain tokens (an open word choice) are never marked.
  confidence_threshold: 0.20

# ---------------------------------------------------------------------------
# Web tools (tools/web.py). API-less by design (2026-07-06): web_search is keyless DuckDuckGo,
# web_extract is a local fetch + trafilatura extraction — no provider key, no account, ever.
# (The old `provider:` knob and the Tavily backend are gone; a config.yaml still carrying
# `provider:` loads fine — unknown keys are ignored.)
# ---------------------------------------------------------------------------
web:
  max_results: 5            # results returned per web_search
  request_timeout: 30       # seconds before an http_request call is killed (mirrors shell.timeout)

# ---------------------------------------------------------------------------
# RAG pipeline (stores/rag.py + the search_knowledge_base tool). Escape-hatch tuning knobs —
# the defaults are sane for a local embedder; most users should never touch these.
#   chunk_size / chunk_overlap: characters per chunk fed to the embedder. Changing either
#     forces a full re-embed on the next sync/startup (the chunking is part of the cache
#     fingerprint, so the stored vectors always match the live settings).
#   k: chunks returned per search_knowledge_base call. Raise for better recall at the cost
#     of more context per retrieval; applies immediately (no re-embed).
# ---------------------------------------------------------------------------
rag:
  chunk_size: 1000
  chunk_overlap: 150
  k: 6

# ---------------------------------------------------------------------------
# MCP servers (tools/mcp_client.py) — remote Model Context Protocol tools, registered at startup
# behind the SAME risk-tier approval gate as local tools. Check status with /mcp; apply config
# edits with /mcp reload (or restart).
#
#   connect_timeout: seconds to start + handshake the servers at startup (shared, they connect
#                    in parallel). A server that misses it is reported and skipped.
#   call_timeout:    seconds per remote tool call before it fails cleanly (mirrors shell.timeout).
#   servers:         name -> entry. Each entry:
#     transport: stdio | http | sse     (optional — inferred: command -> stdio, url -> http)
#     command/args/env                  (stdio: the server process to spawn)
#     url/headers                       (http/sse: the remote endpoint)
#     risk: read_only|side_effecting|destructive   default tier for the server's tools.
#           OMITTED or invalid -> destructive (always prompts). This is YOUR trust declaration —
#           the server's own annotations never drive the gate. Per-tool: /policy risk <tool> <tier> --save.
#     enabled: false                    (keep the entry, skip the connection)
#   ${VAR} in url/args/env/headers expands from the environment / .env (/config key), so secrets
#   never sit in this file. Tools register as `mcp_<server>_<tool>`.
#
# servers:
#   github:
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-github"]
#     env:
#       GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
#   internal-docs:
#     url: https://mcp.example.com/mcp
#     headers:
#       Authorization: Bearer ${EXAMPLE_TOKEN}
#     risk: read_only
# ---------------------------------------------------------------------------
mcp:
  connect_timeout: 20
  call_timeout: 60
  servers: {}

# ---------------------------------------------------------------------------
# Shell / code-execution tool (tools/shell.py).
#   run_shell is registered `destructive`, so it ALWAYS hits the approval gate — the gate (the
#   user seeing + approving the exact command), not a path jail, is the safety boundary.
#   timeout: seconds before a running command is killed, so a hung or interactive command can't
#            wedge the turn (mirrors runtime.llm_timeout). <=0 disables.
# ---------------------------------------------------------------------------
shell:
  timeout: 60

# ---------------------------------------------------------------------------
# Hardware-tier presets. Each maps the agent's roles -> concrete models.
#
# A role value is a model id served by the tier's `provider` (ollama). The mapping form
# ({provider: <name>, model: <id>}) still parses for old configs, but CLOUD PROVIDERS ARE
# SHELVED (2026-07-03, local-first): a non-ollama binding refuses to run with a pointer at
# /models. The cloud-hybrid preset left with the shelve.
#
# Roles: planner (drafts + redrafts the plan, structured output), tool_caller (the execute
# node: per-step reasoning + single-tool constrained calls, native tool-calling), synthesizer
# (final answer), utility (cheap background tasks like document summaries), judge (the engine's
# judgment calls: the rectify verdict, the resolution presence check, the semantic write gate).
# `embedder` is separate.
# ---------------------------------------------------------------------------
tiers:
  # All roles share one local model. Lightest footprint. Must stay in sync with the model list
  # the install scripts pull (install.sh / install.ps1 SATURDAY_MODELS) — a fresh install sets
  # this tier active, so a mismatch breaks the first run.
  laptop:
    provider: ollama
    roles:
      planner: gemma4:e4b
      tool_caller: gemma4:e4b
      synthesizer: gemma4:e4b
      utility: gemma4:e4b
      judge: gemma4:e4b
    embedder: qwen3-embedding:8b

  # The machine this repo runs on today. All roles share one capable local model with reliable
  # native tool-calling + structured output, which the plan/execute engine leans on. Bump the
  # ids here when larger local tags are pulled — no code changes needed.
  # (The cloud-hybrid preset — planner/synthesizer on Anthropic — was removed with the
  # cloud-model shelve, 2026-07-03.)
  workstation:
    provider: ollama
    roles:
      planner: "qwen3.6:27b"
      tool_caller: "qwen3.6:27b"
      synthesizer: "qwen3.6:27b"
      utility: "qwen3.6:27b"
      judge: "qwen3.6:27b"
    embedder: qwen3-embedding:8b

  # Temporary benchmarking tier (added 2026-07-06 for a quick trust-benchmark pass on the
  # already-loaded coder model; safe to delete).
  bench-coder:
    provider: ollama
    roles:
      planner: "qwen3-coder:30b"
      tool_caller: "qwen3-coder:30b"
      synthesizer: "qwen3-coder:30b"
      utility: "qwen3-coder:30b"
      judge: "qwen3-coder:30b"
    embedder: qwen3-embedding:8b

# ---------------------------------------------------------------------------
# Capability descriptors, keyed by model id. The engine REQUIRES native tool-calling +
# structured output; check_models() warns if a model bound to a
# role that needs a capability lacks it. Unknown models fall back to the conservative
# defaults in config.py (tools + structured output assumed true, vision false).
# (The claude-sonnet / gpt-4o entries left with the cloud-model shelve, 2026-07-03.)
# ---------------------------------------------------------------------------
capabilities:
  "gemma4:e2b":
    supports_tools: true
    supports_structured_output: true
    context_window: 8192
    supports_vision: false
  "gemma4:e4b":
    supports_tools: true
    supports_structured_output: true
    context_window: 8192
    supports_vision: false
  "qwen3.5:9b":
    supports_tools: true
    supports_structured_output: true
    context_window: 32768
    supports_vision: false
  # The workstation tier's model — without this entry capability_of falls back to the
  # conservative 8192 default and every call silently runs at a quarter of the real window.
  "qwen3.6:27b":
    supports_tools: true
    supports_structured_output: true
    context_window: 32768
    supports_vision: false
  "qwen3-coder:30b":
    supports_tools: true
    supports_structured_output: true
    context_window: 32768
    supports_vision: false
